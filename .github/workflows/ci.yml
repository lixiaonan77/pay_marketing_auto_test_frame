name: CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  auto_test:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmqctl status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 等待 RabbitMQ 就绪
        run: |
          for i in {1..15}; do
            nc -zv 127.0.0.1 5672 && break
            echo "等待 RabbitMQ... $i/15"
            sleep 3
          done
      - name: 执行测试（全量 Mock）
        env:
          MOCK_LOGIN: 1
          MOCK_API: 1
        run: pytest testcase/ --alluredir=report/allure-results
      - name: 上传报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: report/allure-results
