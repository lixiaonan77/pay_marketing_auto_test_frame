name: CI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

jobs:
  auto_test:
    runs-on: ubuntu-latest

    # 添加 services 段，启动 RabbitMQ 容器
    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: --health-cmd "rabbitmqctl status" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装项目所有依赖
        run: pip install -r requirements.txt

      - name: 自动执行全部自动化用例
        run: pytest testcase/ --alluredir=report/allure-results
